name: Build Windows Executable

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # 允許手動觸發

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Get short commit hash
      id: vars
      shell: bash
      run: |
        echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

    - name: Build with PyInstaller
      run: |
        pyinstaller soundboard.spec

    - name: Rename Executable
      shell: bash
      run: |
        mv dist/soundboard.exe dist/soundboard-${{ env.sha_short }}.exe

    - name: Upload Windows Executable (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Soundboard-Windows-${{ env.sha_short }}
        path: dist/soundboard-${{ env.sha_short }}.exe

    - name: Release Executable
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ env.sha_short }}
        name: Build ${{ env.sha_short }}
        files: dist/soundboard-${{ env.sha_short }}.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
