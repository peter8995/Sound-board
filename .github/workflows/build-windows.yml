name: Build Windows Executable

on:
  workflow_dispatch:
    inputs:
      version:
        description: '自訂版本號 (例如: v1.0.0, 留空則自動使用時間戳記)'
        required: false
        default: ''

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Determine Version
      id: vars
      shell: bash
      run: |
        if [ "${{ github.event.inputs.version }}" != "" ]; then
          echo "CURRENT_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
        else
          echo "CURRENT_VERSION=$(date +'%Y%m%d%H%M')" >> $GITHUB_ENV
        fi

    - name: Build with PyInstaller
      run: |
        pyinstaller soundboard.spec

    - name: Rename Executable
      shell: bash
      run: |
        mv dist/soundboard.exe dist/soundboard-${{ env.CURRENT_VERSION }}.exe

    - name: Upload Windows Executable (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Soundboard-Windows-${{ env.CURRENT_VERSION }}
        path: dist/soundboard-${{ env.CURRENT_VERSION }}.exe

    - name: Release Executable
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.CURRENT_VERSION }}
        name: Release ${{ env.CURRENT_VERSION }}
        files: dist/soundboard-${{ env.CURRENT_VERSION }}.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
